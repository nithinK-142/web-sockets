<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Sockets</title>
</head>

<body>
    <h1>Web Sockets</h1>
    <input type="text" value="hello" id="message-input" placeholder="Enter your message" />
    <button id="message-send-button">Send</button>
    <ul id="message-list"></ul>
</body>
<script>
    const messageInput = document.getElementById("message-input");
    const sendButton = document.getElementById("message-send-button");
    const messageList = document.getElementById("message-list");

    const connection = new WebSocket(`ws://localhost:${window.location.port}`);

    function sendMessage() {
        connection.send(JSON.stringify({ message: messageInput.value }));
        messageInput.value = "";
    }

    sendButton.addEventListener("click", sendMessage);

    connection.onopen = () => {
        console.log("Connected");
    };

    connection.onmessage = (event) => {
        console.log("Response", event.data);
        const parsedData = JSON.parse(event.data.toString());
        const li = document.createElement('li')
        li.textContent = parsedData.message
        messageList.appendChild(li)
    };
</script>

</html>
