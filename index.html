<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Sockets</title>
</head>

<body>
    <h1>Web Sockets</h1>
</body>
<script>
    const connection = new WebSocket(`ws://localhost:${window.location.port}`)
    connection.onopen = () => connection.send("hello server")
    connection.onmessage = (message) => console.log(message)
</script>

</html>
